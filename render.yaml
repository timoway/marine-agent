services:
  - type: web
    name: marine-agent
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python marine_server.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: PORT
        value: "10000"
      - key: OPENUV_KEY
        sync: false
      - key: AGENT_API_KEY
        generateValue: true